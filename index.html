<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WAR ROOM // FLAT HORIZON</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --bg: #020205; --accent: #00f2ff; --panel: rgba(10, 10, 15, 0.9); --intel: #00ff41; --border: #1a1a2e; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; 
        }

        #map-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        .sidebar { 
            pointer-events: auto; position: absolute; left: 20px; top: 20px; bottom: 20px; 
            width: 380px; background: var(--panel); border-right: 2px solid var(--accent); 
            backdrop-filter: blur(10px); display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
        }

        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); }

        .feed { 
            flex: 1; overflow-y: auto; padding: 20px; 
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent; 
        }

        .intel-card { 
            background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent); 
            padding: 12px; margin-bottom: 15px; font-size: 11px; 
        }

        .intel-card h4 { margin: 0 0 5px 0; color: var(--accent); text-transform: uppercase; font-size: 12px; }

        .intel-card p { margin: 5px 0; color: #ccc; line-height: 1.4; }

        .intel-card a { 
            color: var(--intel); text-decoration: none; font-size: 10px; 
            border: 1px solid var(--intel); padding: 3px 6px; margin-top: 8px; 
            display: inline-block; background: rgba(0,0,0,0.4); 
        }

        .hud-stats { 
            pointer-events: auto; position: absolute; right: 20px; top: 20px; 
            text-align: right; color: var(--intel); font-size: 10px; padding: 12px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.8); 
        }

        .timeline-ctrl { 
            position: absolute; bottom: 30px; left: 420px; right: 40px; 
            pointer-events: auto; background: var(--panel); padding: 20px; 
            border: 1px solid var(--border); 
        }

        .mode-toggles {
            position: absolute; top: 120px; right: 20px; pointer-events: auto;
            display: flex; flex-direction: column; gap: 10px;
        }

        .t-btn {
            background: #000; color: #fff; border: 1px solid var(--accent);
            font-family: inherit; font-size: 11px; padding: 10px; cursor: pointer;
            transition: 0.3s; width: 140px;
        }
        .t-btn.active { background: var(--accent); color: #000; }

        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* D3 Map Styles */
        .country { fill: #0d1117; stroke: #1a1a2e; stroke-width: 1; cursor: pointer; transition: fill 0.2s; }
        .country:hover { fill: rgba(0, 242, 255, 0.2); }
        .country.active-country { fill: rgba(0, 242, 255, 0.3); stroke: var(--accent); }
        .country-label { fill: #666; font-size: 8px; font-family: 'JetBrains Mono', sans-serif; pointer-events: none; }
        .migration-arc { fill: none; stroke: var(--intel); stroke-width: 1.5; stroke-dasharray: 4, 4; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -8; } }
    </style>
</head>
<body>

<div id="map-container"></div>

<div class="ui-layer">
    <div class="sidebar">
        <div class="header">
            <div style="font-size: 9px; color: var(--intel); margin-bottom: 5px;">[ SAT-UPLINK: ACTIVE ]</div>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 2px;">GOD'S EYE FLAT</h2>
        </div>
        <div class="feed" id="feed">
            <div style="text-align: center; margin-top: 50%; opacity: 0.5;">> CLICK THE MAP OR TOGGLE MODES</div>
        </div>
    </div>

    <div class="hud-stats">
        DATE: <span id="hud-date">2026 CE</span><br>
        LOCATION: <span id="hud-coords">GLOBAL</span><br>
        MAP: <span style="color:#0f0">FLAT VIEW / LABELED</span>
    </div>

    <div class="mode-toggles">
        <button id="btn-news" class="t-btn active" onclick="setMode('news')">GLOBAL NEWS</button>
        <button id="btn-mig" class="t-btn" onclick="setMode('migration')">JEWISH MIGRATION</button>
    </div>

    <div class="timeline-ctrl">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px;">
            <span id="label-left">-500 BCE</span>
            <span id="year-display" style="color:var(--accent); font-weight:bold;">2026 CE</span>
            <span>PRESENT ERA</span>
        </div>
        <input type="range" id="year-slider" min="-500" max="2026" value="2026" oninput="updateYear(this.value)">
    </div>
</div>

<script>
    let selectedYear = 2026;
    let currentMode = 'news';
    
    // Static Jewish Migration Nodes spanning 2500 years
    const migrationArcs = [
        { from: 'Israel', to: 'Babylon', year: -586, coords: [[35.2, 31.7], [44.4, 32.5]], text: "Babylonian Exile" },
        { from: 'Israel', to: 'Rome', year: 70, coords: [[35.2, 31.7], [12.5, 41.9]], text: "Siege of Jerusalem (Roman Dispersion)" },
        { from: 'Israel', to: 'Spain', year: 1000, coords: [[35.2, 31.7], [-3.7, 40.4]], text: "Rise of Sephardic Golden Age" },
        { from: 'Israel', to: 'Poland', year: 1500, coords: [[35.2, 31.7], [21.0, 52.2]], text: "Ashkenazi Expansion into Eastern Europe" },
        { from: 'Spain', to: 'Turkey', year: 1492, coords: [[-3.7, 40.4], [28.9, 41.0]], text: "Expulsion from Spain (Alhambra Decree)" },
        { from: 'Russia', to: 'USA', year: 1881, coords: [[37.6, 55.7], [-74.0, 40.7]], text: "Pogroms Triggering Massive US Migration" },
        { from: 'Germany', to: 'Israel', year: 1933, coords: [[13.4, 52.5], [35.2, 31.7]], text: "Haavara Agreement (Aliyah Bet)" },
        { from: 'Morocco', to: 'Israel', year: 1948, coords: [[-7.6, 33.6], [35.2, 31.7]], text: "Mizrahi Exodus (Operation Mural)" }
    ];

    const width = window.innerWidth;
    const height = window.innerHeight;

    // Use D3 Mercator for a flat 2D sheet
    const projection = d3.geoMercator()
        .scale(width / 6.3)
        .translate([width / 2.1, height / 1.7]);

    const path = d3.geoPath().projection(projection);

    const svg = d3.select("#map-container").append("svg")
        .attr("width", width)
        .attr("height", height)
        .call(d3.zoom().scaleExtent([1, 8]).on("zoom", (event) => {
            g.attr("transform", event.transform);
        }));

    const g = svg.append("g");

    // Fetch topojson for the shapes
    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(topology => {
        const countries = topojson.feature(topology, topology.objects.countries);

        // Draw country borders
        g.selectAll("path")
            .data(countries.features)
            .enter().append("path")
            .attr("class", "country")
            .attr("d", path)
            .on("click", function(event, d) {
                if (currentMode === 'news') {
                    d3.selectAll(".country").classed("active-country", false);
                    d3.select(this).classed("active-country", true);
                    auditLocation(d);
                }
            });

        // Overlay Country Names
        g.selectAll("text.country-label")
            .data(countries.features)
            .enter().append("text")
            .attr("class", "country-label")
            .attr("transform", d => {
                const centroid = path.centroid(d);
                return centroid ? `translate(${centroid[0]},${centroid[1]})` : null;
            })
            .attr("text-anchor", "middle")
            .text(d => d.properties.name);

        renderMigrations();
    });

    function setMode(mode) {
        currentMode = mode;
        d3.selectAll(".t-btn").classed("active", false);
        d3.select(`#btn-${mode}`).classed("active", true);

        if (mode === 'news') {
            g.selectAll(".migration-arc").remove();
            d3.select("#feed").html(`<div style="text-align: center; margin-top: 50%; opacity: 0.5;">> CLICK ANY COUNTRY TO LAUNCH LIVE NEWS OR WIKIPEDIA</div>`);
        } else {
            d3.selectAll(".country").classed("active-country", false);
            renderMigrations();
        }
    }

    function updateYear(val) {
        selectedYear = parseInt(val);
        const display = selectedYear < 0 ? `${Math.abs(selectedYear)} BCE` : `${selectedYear} CE`;
        d3.select("#year-display").text(display);
        d3.select("#hud-date").text(display);

        if (currentMode === 'migration') {
            renderMigrations();
        }
    }

    function renderMigrations() {
        if (currentMode !== 'migration') return;

        g.selectAll(".migration-arc").remove();

        const activeArcs = migrationArcs.filter(arc => arc.year <= selectedYear);

        g.selectAll(".migration-arc")
            .data(activeArcs)
            .enter().append("path")
            .attr("class", "migration-arc")
            .attr("d", d => {
                const start = projection(d.coords[0]);
                const end = projection(d.coords[1]);
                if (!start || !end) return null;
                
                // Draw slight curves for the arcs
                const dx = end[0] - start[0],
                      dy = end[1] - start[1],
                      dr = Math.sqrt(dx * dx + dy * dy);
                return `M${start[0]},${start[1]}A${dr},${dr} 0 0,1 ${end[0]},${end[1]}`;
            });

        showMigrationFeed(activeArcs);
    }

    function auditLocation(d) {
        const countryName = d.properties.name;
        d3.select("#hud-coords").text(countryName.toUpperCase());

        d3.select("#feed").html(`
            <h3 style="color:var(--accent);">${countryName.toUpperCase()}</h3>
            
            <div class="intel-card" style="border-left: 3px solid #ff0;">
                <h4>[LIVE] GOOGLE NEWS TERMINAL</h4>
                <p>Track live search updates for ${countryName}.</p>
                <a href="https://news.google.com/search?q=${encodeURIComponent(countryName)}" target="_blank">LAUNCH LIVE INTERCEPT</a>
            </div>

            <div class="intel-card" style="border-left: 3px solid #00ff41;">
                <h4>[HISTORICAL] WIKIPEDIA ARCHIVE</h4>
                <p>Analyze historical archives of this area.</p>
                <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(countryName)}" target="_blank">LAUNCH ENCYCLOPEDIA</a>
            </div>

            <div class="intel-card" style="border-left: 3px solid #ff0044;">
                <h4>[TEMPORAL] TIMELINE PORTAL</h4>
                <p>Compare this location against the year ${selectedYear}.</p>
                <a href="https://www.google.com/search?q=${encodeURIComponent(countryName)}+history+year+${selectedYear}" target="_blank">TEMPORAL SEARCH</a>
            </div>
        `);
    }

    function showMigrationFeed(arcs) {
        let html = `<h3 style="color:var(--accent);">MIGRATION LOGS (Up to ${selectedYear})</h3>`;
        
        if (arcs.length === 0) {
            html += `<div class="intel-card"><p>No major recorded migrations before this era.</p></div>`;
        } else {
            arcs.forEach(arc => {
                const era = arc.year < 0 ? `${Math.abs(arc.year)} BCE` : `${arc.year} CE`;
                html += `
                    <div class="intel-card">
                        <h4>${era}: ${arc.from} -> ${arc.to}</h4>
                        <p>${arc.text}</p>
                        <a href="https://www.google.com/search?q=Jewish+migration+history+${encodeURIComponent(arc.from)}+to+${encodeURIComponent(arc.to)}" target="_blank">DECRYPT HISTORY</a>
                    </div>
                `;
            });
        }
        d3.select("#feed").html(html);
    }

    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        svg.attr("width", w).attr("height", h);
        projection.scale(w / 6.3).translate([w / 2.1, h / 1.7]);
        g.selectAll("path.country").attr("d", path);
        g.selectAll("text.country-label").attr("transform", d => {
            const centroid = path.centroid(d);
            return centroid ? `translate(${centroid[0]},${centroid[1]})` : null;
        });
        if (currentMode === 'migration') renderMigrations();
    });
</script>
</body>
</html>
