<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>WAR ROOM // GOD'S EYE v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.45.1"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --bg: #020205; --accent: #00f2ff; --panel: rgba(10, 10, 15, 0.9); --intel: #00ff41; --border: #1a1a2e; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        #globe-viz { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .sidebar { pointer-events: auto; position: absolute; left: 20px; top: 20px; bottom: 20px; width: 380px; background: var(--panel); border-right: 2px solid var(--accent); backdrop-filter: blur(10px); display: flex; flex-direction: column; }
        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); }
        .feed { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
        .intel-card { background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent); padding: 12px; margin-bottom: 15px; font-size: 11px; transition: 0.3s; }
        .intel-card:hover { background: rgba(0, 242, 255, 0.1); }
        .intel-card h4 { margin: 0 0 5px 0; color: var(--accent); text-transform: uppercase; }
        .intel-card a { color: var(--intel); text-decoration: none; font-size: 9px; border: 1px solid var(--intel); padding: 2px 5px; margin-top: 5px; display: inline-block; }
        .hud-stats { position: absolute; right: 20px; top: 20px; text-align: right; color: var(--intel); font-size: 10px; padding: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.7); }
        .timeline-ctrl { position: absolute; bottom: 30px; left: 420px; right: 40px; pointer-events: auto; background: var(--panel); padding: 20px; border: 1px solid var(--border); }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .loading-shimmer { color: var(--accent); font-style: italic; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="globe-viz"></div>

<div class="ui-layer">
    <div class="sidebar">
        <div class="header">
            <div style="font-size: 9px; color: var(--intel); margin-bottom: 5px;">[ SATELLITE LINK: ACTIVE ]</div>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 2px;">GOD'S EYE</h2>
        </div>
        <div class="feed" id="feed">
            <div style="text-align: center; margin-top: 50%; opacity: 0.5;">> SELECT TEMPORAL COORDINATES<br>> CLICK GLOBE TO SCAN</div>
        </div>
    </div>

    <div class="hud-stats">
        DATE: <span id="hud-date">2026.03.23</span><br>
        COORDS: <span id="hud-coords">GLOBAL</span><br>
        STATUS: <span style="color:#0f0">READY</span>
    </div>

    <div class="timeline-ctrl">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px;">
            <span>HISTORICAL ARCHIVE</span>
            <span id="year-display" style="color:var(--accent); font-weight:bold;">2026 CE</span>
            <span>LIVE INTEL</span>
        </div>
        <input type="range" id="year-slider" min="1900" max="2026" value="2026" oninput="updateYear(this.value)">
    </div>
</div>

<script>
    let world;
    let selectedYear = 2026;
    const CORS_PROXY = "https://corsproxy.io/?";

    function initGlobe() {
        world = Globe()(document.getElementById('globe-viz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#020205')
            .showAtmosphere(true)
            .atmosphereColor('#00f2ff')
            .atmosphereAltitude(0.2)
            .onGlobeClick(({ lat, lng }) => {
                world.pointOfView({ lat, lng, altitude: 1.5 }, 1000);
                triggerAudit(lat, lng);
                ping(lat, lng);
            });

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.2;
    }

    function ping(lat, lng) {
        const pulse = { lat, lng, maxR: 5, color: '#00f2ff', propagationSpeed: 2, repeatAfter: 500 };
        world.ringsData([pulse]);
        setTimeout(() => world.ringsData([]), 3000);
    }

    function updateYear(val) {
        selectedYear = val;
        document.getElementById('year-display').textContent = `${val} CE`;
        document.getElementById('hud-date').textContent = val;
    }

    async function triggerAudit(lat, lng) {
        document.getElementById('hud-coords').textContent = `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
        const feed = document.getElementById('feed');
        feed.innerHTML = `<div class="loading-shimmer">> INTERCEPTING DATA FOR YEAR ${selectedYear}...</div>`;

        try {
            // 1. Get City Name
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
            const geo = await geoRes.json();
            const city = geo.address.city || geo.address.town || geo.address.state || "Uncharted Sector";
            
            feed.innerHTML = `<h3 style="color:var(--accent); margin-bottom:20px;">${city.toUpperCase()}</h3>`;

            // 2. Fetch History (Wikipedia Geosearch)
            const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lng}&gsradius=10000&gslimit=5&format=json&origin=*`;
            const wikiRes = await fetch(wikiUrl);
            const wikiData = await wikiRes.json();

            if (wikiData.query?.geosearch) {
                feed.innerHTML += `<div style="font-size:9px; color:#666; margin-bottom:10px;">HISTORICAL LOGS:</div>`;
                for (let item of wikiData.query.geosearch) {
                    const sRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(item.title)}?origin=*`);
                    const s = await sRes.json();
                    
                    // Filter: Only show if it matches the general era (simple simulation)
                    feed.innerHTML += `
                        <div class="intel-card">
                            <h4>${s.title}</h4>
                            <p>${s.extract || 'No archival text found.'}</p>
                            <a href="${s.content_urls?.desktop?.page || '#'}" target="_blank">DECRYPT FILE</a>
                        </div>`;
                }
            }

            // 3. Fetch News (Only if Year is Recent, otherwise search archives)
            if (selectedYear >= 2024) {
                feed.innerHTML += `<div style="font-size:9px; color:#666; margin:20px 0 10px 0;">LIVE NEWS FEED:</div>`;
                const news = await fetchNews(city);
                feed.innerHTML += news;
            } else {
                feed.innerHTML += `<div class="intel-card" style="border-color:#ff0;">
                    <h4>TEMPORAL ARCHIVE NOTICE</h4>
                    <p>Live digital news feeds are unavailable for the year ${selectedYear}. Displaying static historical records only.</p>
                </div>`;
            }

        } catch (err) {
            feed.innerHTML = `<div style="color:red;">> UPLINK FAILED: CONNECTION TIMEOUT</div>`;
        }
    }

    async function fetchNews(city) {
        try {
            const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(city)}&hl=en-US&gl=US&ceid=US:en`;
            const res = await fetch(CORS_PROXY + encodeURIComponent(rssUrl));
            const text = await res.text();
            const xml = new DOMParser().parseFromString(text, "text/xml");
            const items = xml.querySelectorAll("item");
            let html = "";
            for (let i = 0; i < 3; i++) {
                if (!items[i]) break;
                html += `
                    <div class="intel-card" style="border-left: 3px solid #ff0;">
                        <h4 style="color:#ff0;">${items[i].querySelector("title").textContent}</h4>
                        <a href="${items[i].querySelector("link").textContent}" target="_blank">READ REPORT</a>
                    </div>`;
            }
            return html || "No recent news found.";
        } catch (e) {
            return "Unable to establish news link.";
        }
    }

    initGlobe();
</script>
</body>
</html>
