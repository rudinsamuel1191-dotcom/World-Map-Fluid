<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>WAR ROOM // GOD'S EYE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.32.2/dist/globe.gl.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --bg: #020205; 
            --accent: #00f2ff; 
            --panel: rgba(10, 10, 15, 0.9); 
            --intel: #00ff41; 
            --border: #1a1a2e; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; 
        }

        #globe-viz { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        .sidebar { 
            pointer-events: auto; position: absolute; left: 20px; top: 20px; bottom: 20px; 
            width: 380px; background: var(--panel); border-right: 2px solid var(--accent); 
            backdrop-filter: blur(10px); display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
        }

        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); }

        .feed { 
            flex: 1; overflow-y: auto; padding: 20px; 
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent; 
        }

        .intel-card { 
            background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent); 
            padding: 12px; margin-bottom: 15px; font-size: 11px; transition: 0.3s; 
        }

        .intel-card:hover { background: rgba(0, 242, 255, 0.1); }

        .intel-card h4 { margin: 0 0 5px 0; color: var(--accent); text-transform: uppercase; font-size: 12px; }

        .intel-card p { margin: 5px 0; color: #ccc; line-height: 1.4; }

        .intel-card a { 
            color: var(--intel); text-decoration: none; font-size: 10px; 
            border: 1px solid var(--intel); padding: 3px 6px; margin-top: 8px; 
            display: inline-block; background: rgba(0,0,0,0.4); 
        }

        .hud-stats { 
            pointer-events: auto; position: absolute; right: 20px; top: 20px; 
            text-align: right; color: var(--intel); font-size: 10px; padding: 12px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.8); 
        }

        .timeline-ctrl { 
            position: absolute; bottom: 30px; left: 420px; right: 40px; 
            pointer-events: auto; background: var(--panel); padding: 20px; 
            border: 1px solid var(--border); 
        }

        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        .loading-shimmer { color: var(--accent); font-style: italic; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="globe-viz"></div>

<div class="ui-layer">
    <div class="sidebar">
        <div class="header">
            <div style="font-size: 9px; color: var(--intel); margin-bottom: 5px;">[ SATELLITE LINK: ACTIVE ]</div>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 2px;">GOD'S EYE</h2>
        </div>
        <div class="feed" id="feed">
            <div style="text-align: center; margin-top: 50%; opacity: 0.5;">> SELECT TEMPORAL COORDINATES<br>> CLICK GLOBE TO SCAN TARGET</div>
        </div>
    </div>

    <div class="hud-stats">
        DATE: <span id="hud-date">2026.03.23</span><br>
        COORDS: <span id="hud-coords">GLOBAL</span><br>
        STATUS: <span id="sys-status" style="color:#0f0">READY</span>
    </div>

    <div class="timeline-ctrl">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px;">
            <span>HISTORICAL ARCHIVE</span>
            <span id="year-display" style="color:var(--accent); font-weight:bold;">2026 CE</span>
            <span>LIVE INTEL</span>
        </div>
        <input type="range" id="year-slider" min="1950" max="2026" value="2026" oninput="updateYear(this.value)">
    </div>
</div>

<script>
    let world;
    let selectedYear = 2026;
    
    // Bypass CORS for GitHub Pages
    const NEWS_PROXY = "https://api.allorigins.win/raw?url=";

    function initGlobe() {
        world = Globe()(document.getElementById('globe-viz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#020205')
            .showAtmosphere(true)
            .atmosphereColor('#00f2ff')
            .atmosphereAltitude(0.2)
            .onGlobeClick(({ lat, lng }) => {
                world.pointOfView({ lat, lng, altitude: 1.5 }, 1000);
                triggerAudit(lat, lng);
                ping(lat, lng);
            });

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.2;
    }

    function ping(lat, lng) {
        const pulse = { lat, lng, maxR: 5, color: '#00f2ff', propagationSpeed: 2, repeatAfter: 500 };
        world.ringsData([pulse]);
        setTimeout(() => world.ringsData([]), 3000);
    }

    function updateYear(val) {
        selectedYear = val;
        document.getElementById('year-display').textContent = `${val} CE`;
        document.getElementById('hud-date').textContent = val;
    }

    async function triggerAudit(lat, lng) {
        document.getElementById('hud-coords').textContent = `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
        document.getElementById('sys-status').textContent = "SCANNING";
        document.getElementById('sys-status').style.color = "#ff0";
        
        const feed = document.getElementById('feed');
        feed.innerHTML = `<div class="loading-shimmer">> INTERCEPTING DATA FOR YEAR ${selectedYear}...</div>`;

        try {
            // 1. Get City Name
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {
                headers: { 'User-Agent': 'GodsEyeApp/1.0' }
            });
            const geo = await geoRes.json();
            const city = geo.address.city || geo.address.town || geo.address.village || geo.address.state || "Neutral Sector";
            
            feed.innerHTML = `<h3 style="color:var(--accent); margin-bottom:20px; font-size:16px;">${city.toUpperCase()}</h3>`;

            // 2. Fetch Wikipedia History (Uses standard CORS origin allowance)
            const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lng}&gsradius=10000&gslimit=3&format=json&origin=*`;
            const wikiRes = await fetch(wikiUrl);
            const wikiData = await wikiRes.json();

            if (wikiData.query?.geosearch?.length) {
                feed.innerHTML += `<div style="font-size:9px; color:#666; margin-bottom:10px;">TEMPORAL ARCHIVES:</div>`;
                
                for (let item of wikiData.query.geosearch) {
                    const sRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(item.title)}?origin=*`);
                    const s = await sRes.json();
                    
                    feed.innerHTML += `
                        <div class="intel-card">
                            <h4>${s.title}</h4>
                            <p>${s.extract ? s.extract.substring(0, 150) + "..." : "No archival text."}</p>
                            <a href="${s.content_urls?.desktop?.page || '#'}" target="_blank">[ OPEN ARCHIVE ]</a>
                        </div>`;
                }
            } else {
                feed.innerHTML += `<div class="intel-card" style="opacity:0.6">No historical database located.</div>`;
            }

            // 3. Live News Feed (Only if slider is set to 2025/2026)
            if (selectedYear >= 2025) {
                feed.innerHTML += `<div style="font-size:9px; color:#666; margin:20px 0 10px 0;">BROADCAST INTERCEPT:</div>`;
                const news = await fetchNews(city);
                feed.innerHTML += news;
            } else {
                feed.innerHTML += `
                    <div class="intel-card" style="border-color:#ff0;">
                        <h4>TEMPORAL LOCKOUT</h4>
                        <p>Live digital news interceptions are locked for the year ${selectedYear}.</p>
                    </div>`;
            }
            
            document.getElementById('sys-status').textContent = "STABLE";
            document.getElementById('sys-status').style.color = "#0f0";

        } catch (err) {
            console.error(err);
            document.getElementById('sys-status').textContent = "TIMEOUT";
            document.getElementById('sys-status').style.color = "#f00";
            
            feed.innerHTML += `
                <div class="intel-card" style="border-color:red;">
                    <h4>SIGNAL DROPPED</h4>
                    <p>Security protocol or network timeout blocked the server request.</p>
                    <button onclick="triggerAudit(${lat}, ${lng})" style="background:none; border:1px solid #ff0; color:#ff0; font-family:inherit; padding:5px; cursor:pointer; font-size:10px; margin-top:5px;">[ RE-ATTEMPT LINK ]</button>
                </div>`;
        }
    }

    async function fetchNews(city) {
        const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(city)}&hl=en-US&gl=US&ceid=US:en`;
        
        try {
            const res = await fetch(NEWS_PROXY + encodeURIComponent(rssUrl));
            const xmlText = await res.text();

            const xml = new DOMParser().parseFromString(xmlText, "text/xml");
            const items = xml.querySelectorAll("item");
            
            let html = "";
            for (let i = 0; i < 3; i++) {
                if (!items[i]) break;
                const title = items[i].querySelector("title").textContent;
                const link = items[i].querySelector("link").textContent;
                html += `
                    <div class="intel-card" style="border-left: 3px solid #ff0;">
                        <h4 style="color:#ff0;">${title}</h4>
                        <a href="${link}" target="_blank">[ READ REPORT ]</a>
                    </div>`;
            }
            return html || "No recent broadcasts intercepted.";
        } catch (e) {
            return `
                <div class="intel-card" style="border-color:#ff0;">
                    <h4>UPLINK DISTORTION</h4>
                    <p>Standard automated intercept failed to parse XML.</p>
                    <a href="https://news.google.com/search?q=${encodeURIComponent(city)}" target="_blank">[ EXTERNAL INTEL LAUNCH ]</a>
                </div>`;
        }
    }

    initGlobe();
</script>
</body>
</html>
