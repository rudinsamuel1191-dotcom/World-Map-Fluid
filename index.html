<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Internal Intelligence Node</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --panel: #141417;
      --accent: #3b82f6;
      --text: #e4e4e7;
      --muted: #71717a;
      --border: #27272a;
      --intel: #10b981;
    }

    * { box-sizing: border-box; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
    
    /* Console Sidebar */
    .console { width: 450px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--panel); z-index: 100; }
    .terminal-header { padding: 20px; border-bottom: 1px solid var(--border); background: #000; }
    .status-line { font-size: 10px; color: var(--intel); text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; }
    
    .search-input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--intel); padding: 12px; font-size: 13px; outline: none; margin-bottom: 15px; }
    .search-input:focus { border-color: var(--accent); }

    .feed-container { flex: 1; overflow-y: auto; padding: 15px; background: #0c0c0e; scrollbar-width: none; }
    
    /* Intelligence Cards */
    .intel-card { background: #18181b; border: 1px solid var(--border); padding: 15px; border-radius: 4px; margin-bottom: 12px; position: relative; overflow: hidden; }
    .intel-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background: var(--accent); }
    .intel-type { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .intel-title { font-size: 15px; font-weight: bold; margin: 0 0 10px 0; color: #fff; }
    .intel-body { font-size: 12px; line-height: 1.5; color: var(--text); margin-bottom: 10px; }
    
    .action-btn { font-size: 11px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 3px; display: inline-block; }
    .action-btn:hover { background: var(--accent); color: #000; }

    /* Main Globe View */
    #viewport { flex: 1; position: relative; }
    .hud-overlay { position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; }
    .hud-stat { font-size: 12px; color: var(--intel); margin-bottom: 5px; background: rgba(0,0,0,0.7); padding: 4px 10px; }

    /* Timeline Scrub */
    .timeline-footer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 60%; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 50px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
    input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
  </style>
</head>
<body>

<div class="console">
  <div class="terminal-header">
    <div class="status-line">
      <span>System: Active</span>
      <span id="clock">11:36:02 UTC</span>
    </div>
    <input type="text" id="masterSearch" class="search-input" placeholder="> SEARCH COORDS / EVENTS / ENTITIES" />
    <div style="font-size: 11px; color: var(--muted);">Temporal Sync: <span id="syncYear" style="color:var(--accent)">2026 CE</span></div>
  </div>
  
  <div class="feed-container" id="intel-feed">
    <div style="color:var(--muted); font-size:12px; text-align:center; margin-top:40px;">// SYSTEM READY. SELECT TARGET.</div>
  </div>
</div>

<div id="viewport">
  <div id="globe-canvas"></div>
  
  <div class="hud-overlay">
    <div class="hud-stat">LAT: <span id="hud-lat">0.00</span></div>
    <div class="hud-stat">LNG: <span id="hud-lng">0.00</span></div>
    <div class="hud-stat">DATA-NODES: 42,910</div>
  </div>

  <div class="timeline-footer">
    <input type="range" id="masterSlider" min="-2000" max="2026" value="2026" />
  </div>
</div>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
  // Core Intelligence Seeds
  const INTEL_SEEDS = [
    { title: 'Destruction of Jerusalem', lat: 31.76, lng: 35.21, year: 70, summary: 'Strategic breach of Jerusalem walls by Roman legions.', source: 'Wikipedia_Archive' },
    { title: 'Battle of Kiev', lat: 50.45, lng: 30.52, year: 2022, summary: 'Major engagement in the northern theater of operations.', source: 'GDELT_Live' },
    { title: 'Fall of Berlin', lat: 52.52, lng: 13.40, year: 1945, summary: 'Final collapse of the Third Reich central command.', source: 'Military_History_Internal' }
  ];

  const state = { year: 2026, world: null, activeTarget: null };
  const feed = document.getElementById('intel-feed');
  const slider = document.getElementById('masterSlider');

  // Globe Initialization
  state.world = Globe()(document.getElementById('globe-canvas'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
    .backgroundColor('#0a0a0b')
    .ringColor(() => '#3b82f6')
    .ringMaxRadius(4)
    .ringPropagationSpeed(2)
    .onGlobeClick(({ lat, lng }) => {
      document.getElementById('hud-lat').textContent = lat.toFixed(4);
      document.getElementById('hud-lng').textContent = lng.toFixed(4);
      triggerInternalAudit(lat, lng);
    });

  // Time Sync
  slider.oninput = (e) => {
    state.year = parseInt(e.target.value);
    document.getElementById('syncYear').textContent = state.year < 0 ? Math.abs(state.year) + " BCE" : state.year + " CE";
    
    // Auto-update heatmap based on year
    const activeRings = INTEL_SEEDS.filter(s => s.year === state.year || (s.year < state.year && s.year > state.year - 5));
    state.world.ringsData(activeRings);
    
    // Adjust Globe Texture
    state.world.globeImageUrl(state.year < 1850 ? '//unpkg.com/three-globe/example/img/earth-blue-marble.jpg' : '//unpkg.com/three-globe/example/img/earth-night.jpg');
  };

  async function triggerInternalAudit(lat, lng) {
    feed.innerHTML = '<div style="color:var(--accent); font-size:11px;">[ SYSTEM AUDIT IN PROGRESS ]</div>';
    
    try {
      // 1. Identify Location
      const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`).then(r => r.json());
      const name = geo.address.city || geo.address.country || "Target Zone";
      
      feed.innerHTML = `<div style="padding-bottom:15px; border-bottom:1px solid var(--border); margin-bottom:15px;">
        <h2 style="margin:0; color:#fff;">${name.toUpperCase()}</h2>
        <span style="font-size:10px; color:var(--intel);">STATUS: SCANNED // YEAR: ${state.year}</span>
      </div>`;

      // 2. Multi-Source Retrieval
      const [wiki, news] = await Promise.all([
        fetch(`https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lng}&gsradius=10000&gslimit=5&format=json&origin=*`).then(r => r.json()),
        fetch(`https://api.gdeltproject.org/api/v2/doc/doc?query=${encodeURIComponent(name)}&mode=artlist&format=json&maxrecords=5`).then(r => r.json())
      ]);

      // Render Wiki History
      if (wiki.query?.geosearch) {
        for (let item of wiki.query.geosearch) {
          const detail = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(item.title)}`).then(r => r.json());
          renderIntel("HISTORICAL_ARCHIVE", detail.title, detail.extract, detail.content_urls.desktop.page);
        }
      }

      // Render Live Dispatches
      if (news.articles && state.year >= 2015) {
        news.articles.forEach(a => {
          renderIntel("LIVE_DISPATCH", a.title, `Electronic record captured at ${name}.`, a.url);
        });
      }

    } catch(e) { feed.innerHTML = "ERR: UPLINK FAILED."; }
  }

  function renderIntel(type, title, body, link) {
    const card = document.createElement('div');
    card.className = 'intel-card';
    card.innerHTML = `
      <div class="intel-type">${type}</div>
      <div class="intel-title">${title}</div>
      <div class="intel-body">${body}</div>
      <a href="${link}" target="_blank" class="action-btn">ACCESS DATA</a>
    `;
    feed.appendChild(card);
  }

  // Master Search
  document.getElementById('masterSearch').onkeypress = async (e) => {
    if (e.key === 'Enter') {
      const q = e.target.value;
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`).then(r => r.json());
      if (res[0]) {
        state.world.pointOfView({ lat: parseFloat(res[0].lat), lng: parseFloat(res[0].lon), altitude: 1.5 }, 2000);
        triggerInternalAudit(res[0].lat, res[0].lon);
      }
    }
  };

  // UI Housekeeping
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toISOString().split('T')[1].split('.')[0] + " UTC";
  }, 1000);

  window.addEventListener('resize', () => {
    state.world.width(window.innerWidth - 450).height(window.innerHeight);
  });
</script>
</body>
</html>
