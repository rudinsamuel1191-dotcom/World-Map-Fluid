<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WAR ROOM // FLAT OVERLAYS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.32.2/dist/globe.gl.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --bg: #020205; --accent: #00f2ff; --panel: rgba(10, 10, 15, 0.9); --intel: #00ff41; --border: #1a1a2e; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; 
        }

        #globe-viz { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        .sidebar { 
            pointer-events: auto; position: absolute; left: 20px; top: 20px; bottom: 20px; 
            width: 380px; background: var(--panel); border-right: 2px solid var(--accent); 
            backdrop-filter: blur(10px); display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
        }

        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); }

        .feed { 
            flex: 1; overflow-y: auto; padding: 20px; 
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent; 
        }

        .intel-card { 
            background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent); 
            padding: 12px; margin-bottom: 15px; font-size: 11px; 
        }

        .intel-card h4 { margin: 0 0 5px 0; color: var(--accent); text-transform: uppercase; font-size: 12px; }

        .intel-card p { margin: 5px 0; color: #ccc; line-height: 1.4; }

        .intel-card a { 
            color: var(--intel); text-decoration: none; font-size: 10px; 
            border: 1px solid var(--intel); padding: 3px 6px; margin-top: 8px; 
            display: inline-block; background: rgba(0,0,0,0.4); 
        }

        .hud-stats { 
            pointer-events: auto; position: absolute; right: 20px; top: 20px; 
            text-align: right; color: var(--intel); font-size: 10px; padding: 12px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.8); 
        }

        .timeline-ctrl { 
            position: absolute; bottom: 30px; left: 420px; right: 40px; 
            pointer-events: auto; background: var(--panel); padding: 20px; 
            border: 1px solid var(--border); 
        }

        .mode-toggles {
            position: absolute; top: 120px; right: 20px; pointer-events: auto;
            display: flex; flex-direction: column; gap: 10px;
        }

        .t-btn {
            background: #000; color: #fff; border: 1px solid var(--accent);
            font-family: inherit; font-size: 11px; padding: 10px; cursor: pointer;
            transition: 0.3s; width: 140px;
        }
        .t-btn.active { background: var(--accent); color: #000; }

        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="globe-viz"></div>

<div class="ui-layer">
    <div class="sidebar">
        <div class="header">
            <div style="font-size: 9px; color: var(--intel); margin-bottom: 5px;">[ SAT-UPLINK: ACTIVE ]</div>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 2px;">GOD'S EYE FLAT</h2>
        </div>
        <div class="feed" id="feed">
            <div style="text-align: center; margin-top: 50%; opacity: 0.5;">> CLICK FLAT MAP TO INTERCEPT DATA</div>
        </div>
    </div>

    <div class="hud-stats">
        DATE: <span id="hud-date">2026 CE</span><br>
        SECTOR: <span id="hud-coords">GLOBAL</span><br>
        MAP: <span style="color:#0f0">FLAT VIEW / LABELED</span>
    </div>

    <div class="mode-toggles">
        <button id="btn-news" class="t-btn active" onclick="setMode('news')">GLOBAL NEWS</button>
        <button id="btn-mig" class="t-btn" onclick="setMode('migration')">JEWISH MIGRATION</button>
    </div>

    <div class="timeline-ctrl">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px;">
            <span id="label-left">-500 BCE</span>
            <span id="year-display" style="color:var(--accent); font-weight:bold;">2026 CE</span>
            <span>PRESENT ERA</span>
        </div>
        <input type="range" id="year-slider" min="-500" max="2026" value="2026" oninput="updateYear(this.value)">
    </div>
</div>

<script>
    let world;
    let selectedYear = 2026;
    let currentMode = 'news';

    const migrationArcs = [
        { from: 'Israel', to: 'Babylon', year: -586, lat1: 31.76, lng1: 35.21, lat2: 32.53, lng2: 44.42, text: "Babylonian Exile" },
        { from: 'Israel', to: 'Rome', year: 70, lat1: 31.76, lng1: 35.21, lat2: 41.90, lng2: 12.49, text: "Roman Exile (Siege of Jerusalem)" },
        { from: 'Israel', to: 'Spain', year: 1000, lat1: 31.76, lng1: 35.21, lat2: 40.41, lng2: -3.70, text: "Sephardic Golden Age" },
        { from: 'Israel', to: 'Poland', year: 1500, lat1: 31.76, lng1: 35.21, lat2: 52.22, lng2: 21.01, text: "Ashkenazi Expansion" },
        { from: 'Spain', to: 'Ottoman Empire', year: 1492, lat1: 40.41, lng1: -3.70, lat2: 41.00, lng2: 28.97, text: "Alhambra Decree Expulsion" },
        { from: 'Russia', to: 'USA', year: 1881, lat1: 55.75, lng1: 37.61, lat2: 40.71, lng2: -74.00, text: "Pale of Settlement Pogrom Migration" },
        { from: 'Germany', to: 'Israel', year: 1933, lat1: 52.52, lng1: 13.40, lat2: 31.76, lng2: 35.21, text: "Haavara Agreement" },
        { from: 'Morocco', to: 'Israel', year: 1950, lat1: 33.57, lng1: -7.58, lat2: 31.76, lng2: 35.21, text: "Mizrahi Exodus" }
    ];

    function initMap() {
        world = Globe()(document.getElementById('globe-viz'))
            .backgroundColor('#020205')
            .showAtmosphere(false)
            .onGlobeClick(({ lat, lng }) => {
                if (currentMode === 'news') {
                    auditLocation(lat, lng);
                }
            });

        // 1. Force Flat Sheet Projection View
        world.presetCoords({ lat: 0, lng: 0, altitude: 2.2 });
        world.controls().enableRotate = false; // Disable tilting out of flat view

        // 2. Add Country Outlines and Clickable Polygons
        fetch('https://unpkg.com/world-atlas@2.0.2/countries-110m.json')
            .then(res => res.json())
            .then(countriesData => {
                // If using topojson, we decode it. For simple visual overlay we'll use polygons:
                world.polygonsData([]); 
            });

        // Fallback drawing of country borders via Globe.gl's Native fetch
        fetch('https://vasturiano.github.io/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(countries => {
                world.polygonsData(countries.features)
                    .polygonCapColor(() => 'rgba(0, 242, 255, 0.05)')
                    .polygonSideColor(() => 'rgba(255, 255, 255, 0.05)')
                    .polygonStrokeColor(() => 'rgba(0, 242, 255, 0.6)')
                    .polygonLabel(({ properties: d }) => `<b>${d.ADMIN}</b>`)
                    .onPolygonClick(({ properties: d }) => {
                        if (currentMode === 'news') {
                            auditLocationFromCountry(d.ADMIN);
                        }
                    });

                // Set text labels inside the countries
                world.labelsData(countries.features.map(feat => ({
                    lat: feat.properties.LABEL_Y || feat.properties.LATITUDE || 0,
                    lng: feat.properties.LABEL_X || feat.properties.LONGITUDE || 0,
                    text: feat.properties.ADM0_A3 || feat.properties.ISO_A3 || feat.properties.ADMIN,
                    size: 0.5,
                    color: 'rgba(255, 255, 255, 0.7)'
                })))
                .labelText(d => d.text)
                .labelSize(d => d.size)
                .labelColor(d => d.color);
            });

        renderMapOverlay();
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-news').className = (mode === 'news') ? 't-btn active' : 't-btn';
        document.getElementById('btn-mig').className = (mode === 'migration') ? 't-btn active' : 't-btn';
        renderMapOverlay();
    }

    function updateYear(val) {
        selectedYear = parseInt(val);
        const display = selectedYear < 0 ? `${Math.abs(selectedYear)} BCE` : `${selectedYear} CE`;
        document.getElementById('year-display').textContent = display;
        document.getElementById('hud-date').textContent = display;
        renderMapOverlay();
    }

    function renderMapOverlay() {
        if (currentMode === 'migration') {
            const activeArcs = migrationArcs.filter(arc => arc.year <= selectedYear);

            world.arcsData(activeArcs)
                .arcStartLat(d => d.lat1)
                .arcStartLng(d => d.lng1)
                .arcEndLat(d => d.lat2)
                .arcEndLng(d => d.lng2)
                .arcColor(() => '#00ff41')
                .arcDashLength(0.4)
                .arcDashGap(0.2)
                .arcDashAnimateTime(2000);

            showMigrationFeed(activeArcs);
        } else {
            world.arcsData([]);
        }
    }

    async function auditLocation(lat, lng) {
        // Fallback for custom coordinate clicking
        try {
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
            const geo = await geoRes.json();
            const city = geo.address.city || geo.address.country || "Neutral Zone";
            auditLocationFromCountry(city);
        } catch(e) {
            auditLocationFromCountry("Target Area");
        }
    }

    function auditLocationFromCountry(locationName) {
        document.getElementById('hud-coords').textContent = locationName.toUpperCase();
        const feed = document.getElementById('feed');

        feed.innerHTML = `
            <h3 style="color:var(--accent);">${locationName.toUpperCase()}</h3>
            
            <div class="intel-card" style="border-left: 3px solid #ff0;">
                <h4>[LIVE] GOOGLE NEWS TERMINAL</h4>
                <p>Track live search updates for ${locationName}.</p>
                <a href="https://news.google.com/search?q=${encodeURIComponent(locationName)}" target="_blank">LAUNCH LIVE INTERCEPT</a>
            </div>

            <div class="intel-card" style="border-left: 3px solid #00ff41;">
                <h4>[HISTORICAL] WIKIPEDIA ARCHIVE</h4>
                <p>Analyze historical archives of this area.</p>
                <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(locationName)}" target="_blank">LAUNCH ENCYCLOPEDIA</a>
            </div>

            <div class="intel-card" style="border-left: 3px solid #ff0044;">
                <h4>[TEMPORAL] TIMELINE PORTAL</h4>
                <p>Compare this location against year context ${selectedYear}.</p>
                <a href="https://www.google.com/search?q=${encodeURIComponent(locationName)}+history+year+${selectedYear}" target="_blank">TEMPORAL SEARCH</a>
            </div>
        `;
    }

    function showMigrationFeed(arcs) {
        const feed = document.getElementById('feed');
        feed.innerHTML = `<h3 style="color:var(--accent);">MIGRATION LOGS (Up to ${selectedYear})</h3>`;
        
        if (arcs.length === 0) {
            feed.innerHTML += `<div class="intel-card"><p>No major recorded migrations before this era.</p></div>`;
            return;
        }

        arcs.forEach(arc => {
            const era = arc.year < 0 ? `${Math.abs(arc.year)} BCE` : `${arc.year} CE`;
            feed.innerHTML += `
                <div class="intel-card">
                    <h4>${era}: ${arc.from} -> ${arc.to}</h4>
                    <p>${arc.text}</p>
                    <a href="https://www.google.com/search?q=Jewish+migration+${encodeURIComponent(arc.from)}+${encodeURIComponent(arc.to)}" target="_blank">DECRYPT HISTORY</a>
                </div>
            `;
        });
    }

    initMap();
</script>
</body>
</html>
