<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>History Repeats Globe - Master</title>
  <style>
    :root {
      --bg: #020617;
      --panel: #0f172a;
      --panel-2: #1e293b;
      --border: rgba(148, 163, 184, 0.2);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    .page { display: grid; grid-template-rows: auto 1fr; height: 100vh; padding: 16px; gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    
    .topbar { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
    
    .timeline-container { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    input[type="range"] { width: 100%; height: 6px; background: var(--panel-2); border-radius: 5px; appearance: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; }

    input, select, button { background: var(--panel-2); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; }
    button { background: var(--accent); cursor: pointer; font-weight: 600; border: none; padding: 10px 20px; }

    .layout { display: grid; grid-template-columns: 1fr 380px; gap: 16px; min-height: 0; }
    #globe { width: 100%; height: 100%; }
    
    .panel { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 10px; transition: 0.3s; }
    .seed-item { border-left: 4px solid var(--warn); background: rgba(245, 158, 11, 0.05); }
    
    .chip { font-size: 10px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: var(--panel-2); border: 1px solid var(--border); margin-bottom: 8px; display: inline-block; }
    
    label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; display: block; }

    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; overflow-y: auto; }
      .page { overflow-y: auto; }
      .controls { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card topbar">
    <div class="controls">
      <div>
        <label>Search Location</label>
        <input id="searchInput" type="text" placeholder="Jerusalem, Paris..." style="width:100%"/>
      </div>
      <div>
        <label>Specific Year</label>
        <input id="yearInput" type="number" value="2026" style="width:100%"/>
      </div>
      <div>
        <label>Selected Date</label>
        <div id="dateDisplay" style="padding:10px; background:var(--panel-2); border-radius:8px; border:1px solid var(--border); text-align:center; font-weight:bold">March 23, 2026</div>
      </div>
      <button id="searchBtn">Locate</button>
    </div>
    
    <div class="timeline-container">
      <label>Timeline Scrub: <span id="yearLabel" style="color:var(--accent)">2026 CE</span></label>
      <input id="timeSlider" type="range" min="-1000" max="2026" value="2026" />
    </div>
  </div>

  <div class="layout">
    <div class="card" style="position:relative;">
      <div id="globe"></div>
      <div id="globeStatus" style="position:absolute; bottom:15px; left:15px; background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:4px; font-size:12px;">Ready</div>
    </div>

    <div class="card panel">
      <div id="locationHeader">
        <h2 id="locationTitle" style="margin:0 0 5px 0;">The World Archive</h2>
        <p id="locationMeta" style="color:var(--muted); font-size:13px; margin:0">Drag the slider or click a city</p>
      </div>
      <div id="results"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>
  // --- DATA SEEDS ---
  const seedEvents = [
    { title: 'Babylonian Destruction of Jerusalem', country: 'Israel', lat: 31.7683, lng: 35.2137, startYear: -586, summary: 'Nebuchadnezzar II destroyed the First Temple.', sourceUrl: 'https://en.wikipedia.org/wiki/Siege_of_Jerusalem_(587_BC)' },
    { title: 'Roman Destruction of Jerusalem', country: 'Israel', lat: 31.7683, lng: 35.2137, startYear: 70, summary: 'Titus captured the city and destroyed the Second Temple.', sourceUrl: 'https://en.wikipedia.org/wiki/Siege_of_Jerusalem_(70_CE)' },
    { title: 'Crusader Conquest', country: 'Israel', lat: 31.7683, lng: 35.2137, startYear: 1099, summary: 'First Crusade forces captured Jerusalem.', sourceUrl: 'https://en.wikipedia.org/wiki/Siege_of_Jerusalem_(1099)' },
    { title: 'Battle of Jerusalem (WWI)', country: 'Israel', lat: 31.7683, lng: 35.2137, startYear: 1917, summary: 'British forces took control from the Ottomans.', sourceUrl: 'https://en.wikipedia.org/wiki/Battle_of_Jerusalem' },
    { title: 'Invasion of Ukraine', country: 'Ukraine', lat: 50.4501, lng: 30.5234, startYear: 2022, summary: 'Full-scale invasion by Russian forces.', sourceUrl: 'https://en.wikipedia.org/wiki/Russian_invasion_of_Ukraine' }
  ];

  const TEXTURES = {
    ancient: '//unpkg.com/three-globe/example/img/earth-topology.png',
    medieval: '//unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
    modern: '//unpkg.com/three-globe/example/img/earth-night.jpg'
  };

  const state = {
    year: 2026,
    world: null,
    selectedLoc: null
  };

  // --- LOGIC ---
  function init() {
    const globeEl = document.getElementById('globe');
    state.world = Globe()(globeEl)
      .globeImageUrl(TEXTURES.modern)
      .backgroundColor('#020617')
      .ringColor(() => 'red')
      .ringMaxRadius(5)
      .ringPropagationSpeed(3)
      .onGlobeClick(({ lat, lng }) => {
        state.world.pointOfView({ lat, lng, altitude: 1.5 }, 1000);
        reverseGeocode(lat, lng);
      });

    updateYear(2026);
    
    window.addEventListener('resize', () => {
      state.world.width(globeEl.clientWidth).height(globeEl.clientHeight);
    });
  }

  function updateYear(val) {
    state.year = parseInt(val);
    document.getElementById('yearLabel').textContent = state.year < 0 ? Math.abs(state.year) + " BCE" : state.year + " CE";
    document.getElementById('dateDisplay').textContent = `Year: ${state.year}`;
    document.getElementById('yearInput').value = state.year;
    document.getElementById('timeSlider').value = state.year;

    // Swap Texture
    let tex = TEXTURES.modern;
    if(state.year < 500) tex = TEXTURES.ancient;
    else if(state.year < 1880) tex = TEXTURES.medieval;
    state.world.globeImageUrl(tex);

    // Update Globe Markers (Rings)
    const activeEvents = seedEvents.filter(e => e.startYear <= state.year);
    state.world.ringsData(activeEvents);

    if(state.selectedLoc) fetchData(state.selectedLoc);
  }

  async function reverseGeocode(lat, lng) {
    document.getElementById('globeStatus').textContent = "Identifying...";
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
      const data = await res.json();
      const loc = {
        name: data.address.city || data.address.town || data.address.village || data.address.country || "Unknown Location",
        country: data.address.country || ""
      };
      state.selectedLoc = loc;
      document.getElementById('locationTitle').textContent = loc.name;
      fetchData(loc);
      document.getElementById('globeStatus').textContent = "Ready";
    } catch(e) { document.getElementById('globeStatus').textContent = "Search Error"; }
  }

  async function fetchData(loc) {
    const resContainer = document.getElementById('results');
    resContainer.innerHTML = '<p style="color:var(--muted)">Consulting archives...</p>';
    
    const seeds = seedEvents.filter(e => e.country === loc.country && e.startYear <= state.year);
    
    try {
      const wikiRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(loc.name)}`);
      const wiki = wikiRes.ok ? await wikiRes.json() : null;

      resContainer.innerHTML = '';

      seeds.forEach(s => {
        resContainer.innerHTML += `
          <div class="item seed-item">
            <span class="chip" style="color:var(--warn)">Historical Record</span>
            <h3 style="margin:0 0 5px 0">${s.title} (${s.startYear})</h3>
            <p style="font-size:13px; margin:0">${s.summary}</p>
          </div>`;
      });

      if (wiki) {
        resContainer.innerHTML += `
          <div class="item">
            <span class="chip">General Info</span>
            <h3 style="margin:0 0 5px 0">${wiki.title}</h3>
            <p style="font-size:13px; margin:0">${wiki.extract}</p>
          </div>`;
      }
    } catch(e) { resContainer.innerHTML = '<p>Error loading data.</p>'; }
  }

  // --- LISTENERS ---
  document.getElementById('timeSlider').addEventListener('input', (e) => updateYear(e.target.value));
  document.getElementById('yearInput').addEventListener('change', (e) => updateYear(e.target.value));
  document.getElementById('searchBtn').addEventListener('click', async () => {
    const q = document.getElementById('searchInput').value;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
    const data = await res.json();
    if(data[0]) {
      state.world.pointOfView({ lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), altitude: 1.5 }, 2000);
      reverseGeocode(data[0].lat, data[0].lon);
    }
  });

  init();
</script>
</body>
</html>
