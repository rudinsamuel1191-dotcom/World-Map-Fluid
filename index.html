<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>History Repeats Globe</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.container {
  display:grid;
  grid-template-columns:70% 30%;
  height:100vh;
}

#globe {
  width:100%;
  height:100%;
}

.panel {
  padding:15px;
  overflow:auto;
  background:#0f172a;
}

input, select, button {
  padding:8px;
  margin:5px 0;
  width:100%;
}

.event {
  background:#020617;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div style="padding:10px;">
  <h2>History Globe</h2>

  <input id="search" placeholder="Search location..." />
  
  <input id="year" type="number" value="2026" />
  
  <select id="month"></select>
  <select id="day"></select>
</div>

<div class="container">
  <div id="globe"></div>

  <div class="panel">
    <h2 id="location">Click on globe</h2>
    <div id="results"></div>
  </div>
</div>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>

<script>

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

for(let i=1;i<=12;i++){
  month.innerHTML += `<option value="${i}">${months[i-1]}</option>`
}

for(let i=1;i<=28;i++){
  day.innerHTML += `<option value="${i}">${i}</option>`
}

function formatDate(){
  return `${year.value}-${month.value}-${day.value}`
}

const globe = Globe()(document.getElementById('globe'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')

globe.onGlobeClick(async ({lat,lng})=>{
  loadLocation(lat,lng)
})

async function loadLocation(lat,lng){

  location.innerText="Loading..."

  const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
  const geoData = await geo.json()

  const place = geoData.display_name
  location.innerText = place

  loadData(place)
}

async function loadData(place){

  results.innerHTML = "Loading..."

  const yearVal = year.value

  // NEWS (recent only)
  if(yearVal >= 2017){
    try{
      const news = await fetch(`https://api.gdeltproject.org/api/v2/doc/doc?query=${place}&mode=artlist&maxrecords=5&format=json`)
      const data = await news.json()

      if(data.articles && data.articles.length){
        results.innerHTML = "<h3>News</h3>"
        data.articles.forEach(a=>{
          results.innerHTML += `
          <div class="event">
            <b>${a.title}</b><br/>
            <a href="${a.url}" target="_blank">Source</a>
          </div>`
        })
        return
      }
    }catch(e){}
  }

  // FALLBACK HISTORY
  const wiki = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${place}`)
  const wikiData = await wiki.json()

  results.innerHTML = `
    <h3>Historical Info</h3>
    <div class="event">
      <b>${wikiData.title}</b><br/>
      ${wikiData.extract || "No data found"}
      <br/>
      <a href="${wikiData.content_urls?.desktop?.page}" target="_blank">Read more</a>
    </div>
  `
}

// SEARCH
search.addEventListener("keypress", async (e)=>{
  if(e.key==="Enter"){
    const q = search.value
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
    const data = await res.json()

    if(data[0]){
      loadLocation(data[0].lat,data[0].lon)
    }
  }
})

</script>

</body>
</html>
