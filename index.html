<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SITREP // GLOBAL HORIZON</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.32.2/dist/globe.gl.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --bg: #05050a; 
            --accent: #00f2ff; 
            --panel: rgba(5, 5, 8, 0.95); 
            --intel: #00ff41; 
            --border: rgba(0, 242, 255, 0.2); 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; 
        }

        #globe-viz { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* --- THE SLIDING SIDEBAR --- */
        .sidebar { 
            pointer-events: auto; position: absolute; left: -420px; top: 20px; bottom: 20px; 
            width: 380px; background: var(--panel); border: 1px solid var(--border); 
            backdrop-filter: blur(12px); display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); 
            z-index: 20;
        }

        .sidebar.active { transform: translateX(440px); } /* Slides into view */

        .close-btn {
            position: absolute; right: 15px; top: 20px; background: none; border: 1px solid var(--accent);
            color: var(--accent); cursor: pointer; font-family: inherit; font-size: 11px; padding: 4px 8px;
        }

        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); }

        .feed { 
            flex: 1; overflow-y: auto; padding: 20px; 
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent; 
        }

        .intel-card { 
            background: rgba(255,255,255,0.02); border-left: 3px solid var(--accent); 
            padding: 15px; margin-bottom: 15px; font-size: 11px; transition: 0.2s; 
        }
        .intel-card:hover { background: rgba(0, 242, 255, 0.05); }

        .intel-card h4 { margin: 0 0 8px 0; color: var(--accent); text-transform: uppercase; font-size: 12px; }

        .intel-card a { 
            color: var(--intel); text-decoration: none; font-size: 10px; 
            border: 1px solid var(--intel); padding: 4px 8px; margin-top: 10px; 
            display: inline-block; background: rgba(0,0,0,0.3); 
        }

        .hud-stats { 
            pointer-events: auto; position: absolute; right: 20px; top: 20px; 
            text-align: right; color: var(--intel); font-size: 10px; padding: 12px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.8); 
        }

        .timeline-ctrl { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 600px; pointer-events: auto; background: var(--panel); padding: 20px; 
            border: 1px solid var(--border); box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .mode-toggles {
            position: absolute; top: 100px; right: 20px; pointer-events: auto;
            display: flex; flex-direction: column; gap: 10px;
        }

        .t-btn {
            background: #000; color: #fff; border: 1px solid var(--accent);
            font-family: inherit; font-size: 11px; padding: 12px; cursor: pointer;
            transition: 0.3s; width: 150px; text-align: left;
        }
        .t-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="globe-viz"></div>

<div class="ui-layer">
    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar(false)">[X] HIDE</button>
        <div class="header">
            <div style="font-size: 9px; color: var(--intel); margin-bottom: 5px;">[ SAT-INTERCEPT: ENGAGED ]</div>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 2px;" id="sidebar-title">INTEL REGION</h2>
        </div>
        <div class="feed" id="feed"></div>
    </div>

    <div class="hud-stats">
        DATE_MATRIX: <span id="hud-date">2026 CE</span><br>
        SAT_COORD: <span id="hud-coords">SCANNING...</span><br>
        VISUAL: <span style="color:#0f0">TACTICAL PLANE</span>
    </div>

    <div class="mode-toggles">
        <button id="btn-news" class="t-btn active" onclick="setMode('news')">> GENERAL INTEL</button>
        <button id="btn-mig" class="t-btn" onclick="setMode('migration')">> JEWISH MIGRATION</button>
    </div>

    <div class="timeline-ctrl">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px;">
            <span>HISTORICAL BOUND (-500 BCE)</span>
            <span id="year-display" style="color:var(--accent); font-weight:bold;">2026 CE</span>
            <span>LIVE (PRESENT)</span>
        </div>
        <input type="range" id="year-slider" min="-500" max="2026" value="2026" oninput="updateYear(this.value)">
    </div>
</div>

<script>
    let world;
    let selectedYear = 2026;
    let currentMode = 'news';

    // Static Jewish Migration Nodes
    const migrationArcs = [
        { from: 'Israel', to: 'Babylon', year: -586, lat1: 31.76, lng1: 35.21, lat2: 32.53, lng2: 44.42, text: "Babylonian Exile" },
        { from: 'Israel', to: 'Rome', year: 70, lat1: 31.76, lng1: 35.21, lat2: 41.90, lng2: 12.49, text: "Roman Exile (Siege of Jerusalem)" },
        { from: 'Israel', to: 'Spain', year: 1000, lat1: 31.76, lng1: 35.21, lat2: 40.41, lng2: -3.70, text: "Sephardic Golden Age" },
        { from: 'Israel', to: 'Poland', year: 1500, lat1: 31.76, lng1: 35.21, lat2: 52.22, lng2: 21.01, text: "Ashkenazi Expansion" },
        { from: 'Spain', to: 'Ottoman Empire', year: 1492, lat1: 40.41, lng1: -3.70, lat2: 41.00, lng2: 28.97, text: "Expulsion from Spain" },
        { from: 'Russia', to: 'USA', year: 1881, lat1: 55.75, lng1: 37.61, lat2: 40.71, lng2: -74.00, text: "Pogroms Trigger US Migration" },
        { from: 'Germany', to: 'Israel', year: 1933, lat1: 52.52, lng1: 13.40, lat2: 31.76, lng2: 35.21, text: "Haavara Agreement" },
        { from: 'Morocco', to: 'Israel', year: 1950, lat1: 33.57, lng1: -7.58, lat2: 31.76, lng2: 35.21, text: "Mizrahi Exodus" }
    ];

    function initMap() {
        world = Globe()(document.getElementById('globe-viz'))
            .backgroundColor('#05050a')
            .showAtmosphere(false)
            .showGraticules(true)
            .graticuleColor('rgba(0, 242, 255, 0.05)')
            .onGlobeClick(({ lat, lng }) => {
                if (currentMode === 'news') {
                    auditLocation(lat, lng);
                }
            });

        // Use Flat Preset
        world.presetCoords({ lat: 0, lng: 0, altitude: 2.2 });
        world.controls().enableRotate = false; // Force look down

        // Load glowing Country Outlines and Labels via GeoJSON
        fetch('https://vasturiano.github.io/globe.gl/example/datasets/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(countries => {
                world.polygonsData(countries.features)
                    .polygonCapColor(() => 'rgba(0, 242, 255, 0.02)')
                    .polygonSideColor(() => 'rgba(255, 255, 255, 0.05)')
                    .polygonStrokeColor(() => 'rgba(0, 242, 255, 0.5)')
                    .onPolygonClick(({ properties: d }) => {
                        if (currentMode === 'news') {
                            auditLocationFromCountry(d.ADMIN);
                        }
                    });

                // Country Text Labels
                world.labelsData(countries.features.map(feat => ({
                    lat: feat.properties.LABEL_Y || 0,
                    lng: feat.properties.LABEL_X || 0,
                    text: feat.properties.ADMIN,
                    size: 0.4,
                    color: 'rgba(255, 255, 255, 0.4)'
                })))
                .labelText(d => d.text)
                .labelSize(d => d.size)
                .labelColor(d => d.color);
            });

        renderMapOverlay();
    }

    function toggleSidebar(show) {
        const sidebar = document.getElementById('sidebar');
        if (show) {
            sidebar.classList.add('active');
        } else {
            sidebar.classList.remove('active');
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-news').className = (mode === 'news') ? 't-btn active' : 't-btn';
        document.getElementById('btn-mig').className = (mode === 'migration') ? 't-btn active' : 't-btn';
        
        if (mode === 'migration') {
            toggleSidebar(true);
        } else {
            toggleSidebar(false);
        }
        renderMapOverlay();
    }

    function updateYear(val) {
        selectedYear = parseInt(val);
        const display = selectedYear < 0 ? `${Math.abs(selectedYear)} BCE` : `${selectedYear} CE`;
        document.getElementById('year-display').textContent = display;
        document.getElementById('hud-date').textContent = display;
        renderMapOverlay();
    }

    function renderMapOverlay() {
        if (currentMode === 'migration') {
            const activeArcs = migrationArcs.filter(arc => arc.year <= selectedYear);

            world.arcsData(activeArcs)
                .arcStartLat(d => d.lat1)
                .arcStartLng(d => d.lng1)
                .arcEndLat(d => d.lat2)
                .arcEndLng(d => d.lng2)
                .arcColor(() => '#00ff41')
                .arcDashLength(0.4)
                .arcDashGap(0.2)
                .arcDashAnimateTime(2000);

            showMigrationFeed(activeArcs);
        } else {
            world.arcsData([]);
        }
    }

    async function auditLocation(lat, lng) {
        try {
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
            const geo = await geoRes.json();
            const city = geo.address.city || geo.address.country || "Neutral Zone";
            auditLocationFromCountry(city);
        } catch(e) {
            auditLocationFromCountry("Target Area");
        }
    }

    function auditLocationFromCountry(locationName) {
        document.getElementById('hud-coords').textContent = locationName.toUpperCase();
        document.getElementById('sidebar-title').textContent = locationName.toUpperCase();
        const feed = document.getElementById('feed');

        toggleSidebar(true); // Bring out the hidden sidebar

        feed.innerHTML = `
            <div class="intel-card">
                <h4>LIVE GOOGLE NEWS</h4>
                <p>Launch live satellite intercepts and local news wire feeds.</p>
                <a href="https://news.google.com/search?q=${encodeURIComponent(locationName)}" target="_blank">OPEN NEWS UPLINK</a>
            </div>

            <div class="intel-card" style="border-left-color: #00ff41;">
                <h4>HISTORICAL WIKIPEDIA</h4>
                <p>Pull deep-history structural files from encyclopedia indexes.</p>
                <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(locationName)}" target="_blank">OPEN ARCHIVE</a>
            </div>

            <div class="intel-card" style="border-left-color: #ff0044;">
                <h4>TEMPORAL TIMELINE FILTER</h4>
                <p>Correlate this location's state parameters against year ${selectedYear}.</p>
                <a href="https://www.google.com/search?q=${encodeURIComponent(locationName)}+history+year+${selectedYear}" target="_blank">CHRONOS SEARCH</a>
            </div>
        `;
    }

    function showMigrationFeed(arcs) {
        document.getElementById('sidebar-title').textContent = "MIGRATION DATA";
        const feed = document.getElementById('feed');
        feed.innerHTML = `<h3 style="color:var(--accent); font-size:12px; margin-top:0;">CHRONO-LOGS (UP TO ${selectedYear})</h3>`;
        
        if (arcs.length === 0) {
            feed.innerHTML += `<div class="intel-card"><p>No recorded anomalies prior to this era segment.</p></div>`;
            return;
        }

        arcs.forEach(arc => {
            const era = arc.year < 0 ? `${Math.abs(arc.year)} BCE` : `${arc.year} CE`;
            feed.innerHTML += `
                <div class="intel-card">
                    <h4>${era}: ${arc.from} -> ${arc.to}</h4>
                    <p>${arc.text}</p>
                    <a href="https://www.google.com/search?q=Jewish+migration+history+${encodeURIComponent(arc.from)}+to+${encodeURIComponent(arc.to)}" target="_blank">DECRYPT HISTORY</a>
                </div>
            `;
        });
    }

    initMap();
</script>
</body>
</html>
