<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SITREP // FLAT HORIZON</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --bg: #05050a; 
            --accent: #00f2ff; 
            --panel: rgba(5, 5, 10, 0.95); 
            --intel: #00ff41; 
            --border: rgba(0, 242, 255, 0.2); 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; 
        }

        #map { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: var(--bg); }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* --- Sliding Sidebar --- */
        .sidebar { 
            pointer-events: auto; position: absolute; left: -420px; top: 20px; bottom: 20px; 
            width: 380px; background: var(--panel); border: 1px solid var(--border); 
            backdrop-filter: blur(12px); display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); 
            z-index: 20;
        }

        .sidebar.active { transform: translateX(440px); }

        .close-btn {
            position: absolute; right: 15px; top: 20px; background: none; border: 1px solid var(--accent);
            color: var(--accent); cursor: pointer; font-family: inherit; font-size: 11px; padding: 4px 8px;
        }

        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); }

        .feed { 
            flex: 1; overflow-y: auto; padding: 20px; 
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent; 
        }

        .intel-card { 
            background: rgba(255,255,255,0.02); border-left: 3px solid var(--accent); 
            padding: 15px; margin-bottom: 15px; font-size: 11px; 
        }

        .intel-card h4 { margin: 0 0 8px 0; color: var(--accent); text-transform: uppercase; font-size: 12px; }

        .intel-card a { 
            color: var(--intel); text-decoration: none; font-size: 10px; 
            border: 1px solid var(--intel); padding: 4px 8px; margin-top: 10px; 
            display: inline-block; background: rgba(0,0,0,0.3); 
        }

        .hud-stats { 
            pointer-events: auto; position: absolute; right: 20px; top: 20px; 
            text-align: right; color: var(--intel); font-size: 10px; padding: 12px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.8); 
        }

        .timeline-ctrl { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 600px; pointer-events: auto; background: var(--panel); padding: 20px; 
            border: 1px solid var(--border); box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .mode-toggles {
            position: absolute; top: 100px; right: 20px; pointer-events: auto;
            display: flex; flex-direction: column; gap: 10px;
        }

        .t-btn {
            background: #000; color: #fff; border: 1px solid var(--accent);
            font-family: inherit; font-size: 11px; padding: 12px; cursor: pointer;
            transition: 0.3s; width: 160px; text-align: left;
        }
        .t-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* Remove Leaflet attributions to keep it clean */
        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-layer">
    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar(false)">[X] HIDE</button>
        <div class="header">
            <div style="font-size: 9px; color: var(--intel); margin-bottom: 5px;">[ SAT-INTERCEPT: ENGAGED ]</div>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 2px;" id="sidebar-title">INTEL REGION</h2>
        </div>
        <div class="feed" id="feed"></div>
    </div>

    <div class="hud-stats">
        DATE_MATRIX: <span id="hud-date">2026 CE</span><br>
        SAT_COORD: <span id="hud-coords">SCANNING...</span><br>
        VISUAL: <span style="color:#0f0">TRUE FLAT PLANE</span>
    </div>

    <div class="mode-toggles">
        <button id="btn-news" class="t-btn active" onclick="setMode('news')">> GENERAL NEWS</button>
        <button id="btn-mig" class="t-btn" onclick="setMode('migration')">> JEWISH MIGRATION</button>
    </div>

    <div class="timeline-ctrl">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px;">
            <span>HISTORICAL (-500 BCE)</span>
            <span id="year-display" style="color:var(--accent); font-weight:bold;">2026 CE</span>
            <span>LIVE (PRESENT)</span>
        </div>
        <input type="range" id="year-slider" min="-500" max="2026" value="2026" oninput="updateYear(this.value)">
    </div>
</div>

<script>
    let map;
    let currentMode = 'news';
    let selectedYear = 2026;
    let migrationLayers = [];

    const migrationArcs = [
        { from: 'Israel', to: 'Babylon', year: -586, start: [31.76, 35.21], end: [32.53, 44.42], text: "Babylonian Exile" },
        { from: 'Israel', to: 'Rome', year: 70, start: [31.76, 35.21], end: [41.90, 12.49], text: "Roman Exile (Fall of Jerusalem)" },
        { from: 'Israel', to: 'Spain', year: 1000, start: [31.76, 35.21], end: [40.41, -3.70], text: "Sephardic Golden Age" },
        { from: 'Israel', to: 'Poland', year: 1500, start: [31.76, 35.21], end: [52.22, 21.01], text: "Ashkenazi Settlement" },
        { from: 'Spain', to: 'Turkey', year: 1492, start: [40.41, -3.70], end: [41.01, 28.97], text: "Alhambra Decree Expulsion" },
        { from: 'Russia', to: 'USA', year: 1881, start: [55.75, 37.61], end: [40.71, -74.00], text: "Pogroms Drive US Migration" },
        { from: 'Germany', to: 'Israel', year: 1933, start: [52.52, 13.40], end: [31.76, 35.21], text: "Haavara Agreement" },
        { from: 'Morocco', to: 'Israel', year: 1950, start: [33.57, -7.58], end: [31.76, 35.21], text: "Mizrahi Exodus" }
    ];

    function initMap() {
        // Initialize Leaflet 2D flat map
        map = L.map('map', {
            center: [20, 0],
            zoom: 2,
            minZoom: 2,
            maxZoom: 6,
            zoomControl: false // Keeps screen clean
        });

        // Glowing, high-tech neon carto-tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Map Click Event
        map.on('click', function(e) {
            if (currentMode === 'news') {
                auditLocation(e.latlng.lat, e.latlng.lng);
            }
        });
    }

    function toggleSidebar(show) {
        const sidebar = document.getElementById('sidebar');
        if (show) {
            sidebar.classList.add('active');
        } else {
            sidebar.classList.remove('active');
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-news').className = (mode === 'news') ? 't-btn active' : 't-btn';
        document.getElementById('btn-mig').className = (mode === 'migration') ? 't-btn active' : 't-btn';
        
        if (mode === 'migration') {
            toggleSidebar(true);
        } else {
            toggleSidebar(false);
        }
        renderMigrations();
    }

    function updateYear(val) {
        selectedYear = parseInt(val);
        const display = selectedYear < 0 ? `${Math.abs(selectedYear)} BCE` : `${selectedYear} CE`;
        document.getElementById('year-display').textContent = display;
        document.getElementById('hud-date').textContent = display;
        
        if (currentMode === 'migration') {
            renderMigrations();
        }
    }

    function renderMigrations() {
        // Clear old migration lines
        migrationLayers.forEach(layer => map.removeLayer(layer));
        migrationLayers = [];

        if (currentMode !== 'migration') return;

        const activeArcs = migrationArcs.filter(arc => arc.year <= selectedYear);

        activeArcs.forEach(arc => {
            // Draw visual lines for migration trajectories
            const polyline = L.polyline([arc.start, arc.end], {
                color: 'var(--intel)',
                weight: 2,
                dashArray: '5, 10',
                opacity: 0.8
            }).addTo(map);

            // Pulse point at destination
            const circle = L.circleMarker(arc.end, {
                color: 'var(--accent)',
                radius: 5,
                fillOpacity: 0.8
            }).addTo(map);

            migrationLayers.push(polyline, circle);
        });

        showMigrationFeed(activeArcs);
    }

    async function auditLocation(lat, lng) {
        document.getElementById('hud-coords').textContent = `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
        
        try {
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
            const geo = await geoRes.json();
            const city = geo.address.city || geo.address.country || "Neutral Zone";
            
            document.getElementById('sidebar-title').textContent = city.toUpperCase();
            const feed = document.getElementById('feed');

            toggleSidebar(true); // Pull open sidebar on click

            feed.innerHTML = `
                <div class="intel-card">
                    <h4>LIVE GOOGLE NEWS</h4>
                    <p>Track live search updates and localized news wire feeds for this sector.</p>
                    <a href="https://news.google.com/search?q=${encodeURIComponent(city)}" target="_blank">OPEN NEWS WIRE</a>
                </div>

                <div class="intel-card" style="border-left-color: #00ff41;">
                    <h4>HISTORICAL ARCHIVE</h4>
                    <p>Access digitized encyclopedia files indexing the geographical history of this zone.</p>
                    <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(city)}" target="_blank">OPEN WIKI ARCHIVE</a>
                </div>

                <div class="intel-card" style="border-left-color: #ff0044;">
                    <h4>CHRONOS SEARCH (YEAR ${selectedYear})</h4>
                    <p>Investigate timeline logs by pairing current query with timeline parameters.</p>
                    <a href="https://www.google.com/search?q=${encodeURIComponent(city)}+history+year+${selectedYear}" target="_blank">TEMPORAL SEARCH</a>
                </div>
            `;
        } catch(e) {
            console.error(e);
        }
    }

    function showMigrationFeed(arcs) {
        document.getElementById('sidebar-title').textContent = "MIGRATION DATA";
        const feed = document.getElementById('feed');
        feed.innerHTML = `<h3 style="color:var(--accent); font-size:12px; margin-top:0;">CHRONO-LOGS (UP TO ${selectedYear})</h3>`;
        
        if (arcs.length === 0) {
            feed.innerHTML += `<div class="intel-card"><p>No recorded movements prior to this timestamp segment.</p></div>`;
            return;
        }

        arcs.forEach(arc => {
            const era = arc.year < 0 ? `${Math.abs(arc.year)} BCE` : `${arc.year} CE`;
            feed.innerHTML += `
                <div class="intel-card">
                    <h4>${era}: ${arc.from} -> ${arc.to}</h4>
                    <p>${arc.text}</p>
                    <a href="https://www.google.com/search?q=Jewish+migration+history+${encodeURIComponent(arc.from)}+to+${encodeURIComponent(arc.to)}" target="_blank">DECRYPT HISTORY</a>
                </div>
            `;
        });
    }

    initMap();
</script>
</body>
</html>
