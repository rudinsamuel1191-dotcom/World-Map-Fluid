<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>WAR ROOM // SUPREME COMMAND</title>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #020205;
            --accent: #00f2ff;
            --panel: rgba(10, 10, 15, 0.9);
            --border: #1a1a2e;
            --intel: #00ff41;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; }

        /* The Map Engine Container */
        #globe-viz { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* Overlays - War Room UI */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; border: 20px solid transparent; border-image: radial-gradient(circle, transparent 70%, rgba(0, 242, 255, 0.05) 100%) 30; }

        .sidebar { pointer-events: auto; position: absolute; left: 20px; top: 20px; bottom: 20px; width: 400px; background: var(--panel); border: 1px solid var(--border); backdrop-filter: blur(10px); display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.8); }

        .header { padding: 20px; border-bottom: 1px solid var(--border); background: #000; }
        .feed { flex: 1; overflow-y: auto; padding: 15px; font-size: 11px; scrollbar-width: none; }
        
        .intel-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
        .intel-card h4 { margin: 0 0 5px 0; color: var(--accent); font-size: 13px; }

        /* Tactical HUD Elements */
        .hud-stats { position: absolute; right: 20px; top: 20px; text-align: right; color: var(--intel); font-size: 10px; line-height: 1.5; }
        .timeline-ctrl { position: absolute; bottom: 40px; right: 20px; width: 300px; pointer-events: auto; background: var(--panel); padding: 15px; border: 1px solid var(--border); }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        input[type=text] { width: 100%; background: #000; border: 1px solid var(--border); color: var(--intel); padding: 10px; margin-top: 10px; outline: none; }

        .scanline { width: 100%; height: 2px; background: rgba(0, 242, 255, 0.1); position: absolute; top: 0; z-index: 100; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div class="scanline"></div>

<div id="globe-viz"></div>

<div class="ui-layer">
    <div class="sidebar">
        <div class="header">
            <div style="font-size: 9px; color: var(--intel); margin-bottom: 5px;">> ENCRYPTED UPLINK: STABLE</div>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 2px;">OMNI-COMMAND</h2>
            <input type="text" id="search" placeholder="TARGET COORDS / CITY NAME" onkeypress="handleSearch(event)">
        </div>
        <div class="feed" id="feed">
            <div style="opacity: 0.5; text-align: center; margin-top: 50px;">// STANDING BY FOR TARGET ACQUISITION...</div>
        </div>
    </div>

    <div class="hud-stats">
        [ SYSTEM STATUS: OPTIMAL ]<br>
        [ TARGETING: <span id="cur-loc">GLOBAL</span> ]<br>
        [ DATE: <span id="cur-date">2026.03.23</span> ]<br>
        [ ZOOM: 1.5x ]
    </div>

    <div class="timeline-ctrl">
        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px;">
            <span id="year-label">2026 CE</span>
            <span>TEMPORAL SCRUB</span>
        </div>
        <input type="range" id="slider" min="-2000" max="2026" value="2026" oninput="updateTime(this.value)">
    </div>
</div>

<script>
    const feed = document.getElementById('feed');
    let world;

    // 1. Initialize the Visual Engine
    function initGlobe() {
        world = Globe()(document.getElementById('globe-viz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#020205')
            .showAtmosphere(true)
            .atmosphereColor('#00f2ff')
            .atmosphereDayLightIntensity(0.1)
            .onGlobeClick(({ lat, lng }) => {
                world.pointOfView({ lat, lng, altitude: 1.5 }, 1000);
                auditLocation(lat, lng);
            });

        // Set initial view
        world.pointOfView({ lat: 31.7, lng: 35.2, altitude: 2 });
        
        // Responsive resize
        window.addEventListener('resize', () => {
            world.width(window.innerWidth).height(window.innerHeight);
        });
    }

    // 2. Intelligence Logic
    async function auditLocation(lat, lng) {
        document.getElementById('cur-loc').textContent = `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
        feed.innerHTML = '<div style="color: var(--accent)">> INTERCEPTING LOCAL SIGNALS...</div>';

        try {
            const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`).then(r => r.json());
            const city = geo.address.city || geo.address.country || "UNKNOWN ZONE";
            
            feed.innerHTML = `<h3 style="margin-top:0">${city.toUpperCase()}</h3>`;

            // Wikipedia Context
            const wiki = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lng}&gsradius=10000&gslimit=4&format=json&origin=*`).then(r => r.json());
            
            if (wiki.query?.geosearch) {
                for (let item of wiki.query.geosearch) {
                    const d = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(item.title)}`).then(r => r.json());
                    feed.innerHTML += `
                        <div class="intel-card">
                            <h4>${d.title}</h4>
                            <div>${d.extract}</div>
                            <a href="${d.content_urls.desktop.page}" target="_blank" style="color:var(--intel); font-size:9px; text-decoration:none;">[ OPEN ARCHIVE ]</a>
                        </div>`;
                }
            }
        } catch (e) {
            feed.innerHTML = '<div style="color:red">> UPLINK ERROR: TIMEOUT</div>';
        }
    }

    // 3. Command Functions
    function updateTime(val) {
        document.getElementById('year-label').textContent = val < 0 ? Math.abs(val) + " BCE" : val + " CE";
        document.getElementById('cur-date').textContent = val;
        
        // Visually change the map based on era
        const tex = val < 1850 ? '//unpkg.com/three-globe/example/img/earth-blue-marble.jpg' : '//unpkg.com/three-globe/example/img/earth-dark.jpg';
        world.globeImageUrl(tex);
    }

    async function handleSearch(e) {
        if (e.key === 'Enter') {
            const q = e.target.value;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`).then(r => r.json());
            if (res[0]) {
                const lat = parseFloat(res[0].lat);
                const lng = parseFloat(res[0].lon);
                world.pointOfView({ lat, lng, altitude: 1.5 }, 2000);
                auditLocation(lat, lng);
            }
        }
    }

    // Launch
    initGlobe();
</script>
</body>
</html>
