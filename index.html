<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>WAR ROOM // GOD'S EYE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.32.2/dist/globe.gl.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --bg: #020205; 
            --accent: #00f2ff; 
            --panel: rgba(10, 10, 15, 0.9); 
            --intel: #00ff41; 
            --border: #1a1a2e; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; 
        }

        #globe-viz { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        .sidebar { 
            pointer-events: auto; position: absolute; left: 20px; top: 20px; bottom: 20px; 
            width: 380px; background: var(--panel); border-right: 2px solid var(--accent); 
            backdrop-filter: blur(10px); display: flex; flex-direction: column; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
        }

        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--border); }

        .feed { 
            flex: 1; overflow-y: auto; padding: 20px; 
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent; 
        }

        .intel-card { 
            background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent); 
            padding: 12px; margin-bottom: 15px; font-size: 11px; transition: 0.3s; 
        }

        .intel-card:hover { background: rgba(0, 242, 255, 0.1); }

        .intel-card h4 { margin: 0 0 5px 0; color: var(--accent); text-transform: uppercase; font-size: 12px; }

        .intel-card p { margin: 5px 0; color: #ccc; line-height: 1.4; }

        .hud-stats { 
            pointer-events: auto; position: absolute; right: 20px; top: 20px; 
            text-align: right; color: var(--intel); font-size: 10px; padding: 12px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.8); 
        }

        .timeline-ctrl { 
            position: absolute; bottom: 30px; left: 420px; right: 40px; 
            pointer-events: auto; background: var(--panel); padding: 20px; 
            border: 1px solid var(--border); 
        }

        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        .loading-shimmer { color: var(--accent); font-style: italic; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="globe-viz"></div>

<div class="ui-layer">
    <div class="sidebar">
        <div class="header">
            <div style="font-size: 9px; color: var(--intel); margin-bottom: 5px;">[ SATELLITE LINK: ACTIVE ]</div>
            <h2 style="margin: 0; font-size: 18px; letter-spacing: 2px;">GOD'S EYE</h2>
        </div>
        <div class="feed" id="feed">
            <div style="text-align: center; margin-top: 50%; opacity: 0.5;">> SELECT TEMPORAL COORDINATES<br>> CLICK GLOBE TO SCAN TARGET</div>
        </div>
    </div>

    <div class="hud-stats">
        DATE: <span id="hud-date">2026.03.23</span><br>
        COORDS: <span id="hud-coords">GLOBAL</span><br>
        STATUS: <span id="sys-status" style="color:#0f0">READY</span>
    </div>

    <div class="timeline-ctrl">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px;">
            <span>HISTORICAL ARCHIVE</span>
            <span id="year-display" style="color:var(--accent); font-weight:bold;">2026 CE</span>
            <span>LIVE INTEL</span>
        </div>
        <input type="range" id="year-slider" min="1914" max="2026" value="2026" oninput="updateYear(this.value)">
    </div>
</div>

<script>
    let world;
    let selectedYear = 2026;

    // --- BUILT-IN OFFLINE DATABASE (Guaranteed to work on GitHub Pages) ---
    const INTEL_DATABASE = {
        "New York": [
            { year: 1929, title: "Wall Street Crash", text: "The Great Depression begins. Stock market crashes, plunging the world economy into chaos." },
            { year: 2001, title: "September 11 Attacks", text: "World Trade Center towers are destroyed in an unprecedented act of global terror." }
        ],
        "London": [
            { year: 1940, title: "The Blitz Begins", text: "German Luftwaffe initiates heavy bombardment over London during WWII." },
            { year: 2012, title: "Summer Olympic Games", text: "London hosts the global sports event, opening its doors to international delegates." }
        ],
        "Jerusalem": [
            { year: 1948, title: "State Sovereignty Declared", text: "End of the British Mandate. Dynamic geopolitical shift occurs in the Middle East." },
            { year: 1967, title: "Unification of the Sector", text: "Historical tactical shift as old limits fall under single-jurisdiction control." }
        ],
        "Tokyo": [
            { year: 1945, title: "Reconstruction Protocols", text: "Heavy structural damages from fire raids. City enters rapid modernization cycle." },
            { year: 2021, title: "Bio-Secure Olympic Games", text: "Games are hosted without physical spectators under strict viral containment grids." }
        ]
    };

    function initGlobe() {
        world = Globe()(document.getElementById('globe-viz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#020205')
            .showAtmosphere(true)
            .atmosphereColor('#00f2ff')
            .atmosphereAltitude(0.2)
            .onGlobeClick(({ lat, lng }) => {
                world.pointOfView({ lat, lng, altitude: 1.5 }, 1000);
                triggerAudit(lat, lng);
                ping(lat, lng);
            });

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.2;
    }

    function ping(lat, lng) {
        const pulse = { lat, lng, maxR: 5, color: '#00f2ff', propagationSpeed: 2, repeatAfter: 500 };
        world.ringsData([pulse]);
        setTimeout(() => world.ringsData([]), 3000);
    }

    function updateYear(val) {
        selectedYear = parseInt(val);
        document.getElementById('year-display').textContent = `${val} CE`;
        document.getElementById('hud-date').textContent = val;
    }

    async function triggerAudit(lat, lng) {
        document.getElementById('hud-coords').textContent = `${lat.toFixed(2)}, ${lng.toFixed(2)}`;
        document.getElementById('sys-status').textContent = "SCANNING";
        document.getElementById('sys-status').style.color = "#ff0";
        
        const feed = document.getElementById('feed');
        feed.innerHTML = `<div class="loading-shimmer">> ACCESSING EMBEDDED INTEL FOR ${selectedYear}...</div>`;

        try {
            // We use standard fetch just to see if we can read the location
            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {
                headers: { 'User-Agent': 'GodsEyeDashboard/1.0' }
            });
            const geo = await geoRes.json();
            const city = geo.address.city || geo.address.town || geo.address.village || geo.address.state || "Sector Unknown";
            
            feed.innerHTML = `<h3 style="color:var(--accent); margin-bottom:20px; font-size:16px;">${city.toUpperCase()}</h3>`;

            // Filter internal Database by the city and the slider's year
            let foundIntel = false;

            for (const [cityName, events] of Object.entries(INTEL_DATABASE)) {
                if (city.toLowerCase().includes(cityName.toLowerCase())) {
                    events.forEach(event => {
                        // If the slider year is past the event year, display it!
                        if (selectedYear >= event.year) {
                            foundIntel = true;
                            feed.innerHTML += `
                                <div class="intel-card">
                                    <h4>[DATE LOG: ${event.year}] ${event.title}</h4>
                                    <p>${event.text}</p>
                                </div>`;
                        }
                    });
                }
            }

            if (!foundIntel) {
                feed.innerHTML += `
                    <div class="intel-card" style="opacity: 0.6">
                        <h4>NO BASELINE EVENT</h4>
                        <p>No historical anomalies registered for ${city} in the year ${selectedYear}. Try clicking London, New York, or Tokyo!</p>
                    </div>`;
            }

            // News fallback for current era
            if (selectedYear >= 2025) {
                feed.innerHTML += `
                    <div style="font-size:9px; color:#666; margin:20px 0 10px 0;">LIVE FEED REDIRECT:</div>
                    <div class="intel-card" style="border-left: 3px solid #ff0;">
                        <h4>GLOBAL NEWS TERMINAL</h4>
                        <p>Aggregated local broadcast intercepts for ${city}.</p>
                        <a href="https://news.google.com/search?q=${encodeURIComponent(city)}" target="_blank" style="color:var(--intel); text-decoration:none; border:1px solid var(--intel); padding:3px 6px; font-size:10px; display:inline-block; margin-top:5px;">OPEN EXTERNAL INTEL</a>
                    </div>`;
            }

            document.getElementById('sys-status').textContent = "STABLE";
            document.getElementById('sys-status').style.color = "#0f0";

        } catch (err) {
            // In case Nominatim is down, it pulls data relying purely on coordinates
            const mockCity = (lat > 30 && lat < 50 && lng > -90 && lng < -70) ? "New York" : "Remote Node";
            feed.innerHTML = `<h3 style="color:var(--accent); margin-bottom:20px; font-size:16px;">OFFLINE CACHE: ${mockCity.toUpperCase()}</h3>`;
            
            if(INTEL_DATABASE[mockCity]) {
                INTEL_DATABASE[mockCity].forEach(event => {
                    if (selectedYear >= event.year) {
                        feed.innerHTML += `
                            <div class="intel-card">
                                <h4>[OFFLINE CACHE: ${event.year}] ${event.title}</h4>
                                <p>${event.text}</p>
                            </div>`;
                    }
                });
            } else {
                feed.innerHTML += `<div class="intel-card"><p>Click on New York, London, or Tokyo to see historical simulation logs.</p></div>`;
            }
            document.getElementById('sys-status').textContent = "LOCAL";
            document.getElementById('sys-status').style.color = "#00f2ff";
        }
    }

    initGlobe();
</script>
</body>
</html>
